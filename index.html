                reviewsLink: "https://t.me/bez_dtp", telegramLink: "https://t.me/bez_dtp"
            }
        ];

        const sheetCache = {};

        // --- ЛОГИКА ИНТЕРФЕЙСА ---
        function openSheet(htmlContent) {
            if (isMeasuring) return; 
            document.getElementById('sheetContent').innerHTML = htmlContent;
            document.getElementById('bottomSheet').classList.remove('translate-y-full');
            closeMenu();
        }

        function closeSheet() {
            document.getElementById('bottomSheet').classList.add('translate-y-full');
            setTimeout(() => { document.getElementById('sheetContent').innerHTML = ''; }, 300);
        }

        function openMenu() { document.getElementById('navMenu').classList.remove('translate-x-full'); }
        function closeMenu() { document.getElementById('navMenu').classList.add('translate-x-full'); }

        window.flyToPoint = function(lat, lng, cacheId) {
            closeMenu();
            map.flyTo([lat, lng], 17, { animate: true, duration: 1.5 });
            setTimeout(() => { openSheet(sheetCache[cacheId]); }, 1500);
        };

        function openFullscreen(index, arrayName) {
            let code = '';
            if (arrayName === 'videoPoints') code = videoPointsData[index].vkCode;
            if (arrayName === 'streetPoints') code = streetPointsData[index].vkCode;
            if (arrayName === 'routeLines') code = routeLinesData[index].vkCode;
            
            const container = document.getElementById('modalVideoContent');
            container.innerHTML = code;
            
            const iframe = container.querySelector('iframe');
            if (iframe) {
                iframe.style.position = 'absolute'; iframe.style.top = '0'; iframe.style.left = '0'; iframe.style.width = '100%'; iframe.style.height = '100%';
            }
            
            document.getElementById('bottomSheet').classList.add('translate-y-full');
            document.getElementById('videoModal').classList.remove('hidden');
            document.getElementById('videoModal').classList.add('flex');
        }

        function closeFullscreen() {
            document.getElementById('modalVideoContent').innerHTML = ''; 
            document.getElementById('videoModal').classList.add('hidden');
            document.getElementById('videoModal').classList.remove('flex');
            document.getElementById('bottomSheet').classList.remove('translate-y-full');
        }

        // --- ДВИЖОК КАРТЫ ---
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22, maxNativeZoom: 19 });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 19 });

        const map = L.map('map', { center: [57.5871, 39.8515], zoom: 16, maxZoom: 22, layers: [streetLayer], zoomControl: false });
        map.attributionControl.setPrefix(''); 
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 8 ГРУПП СЛОЕВ!
        const videoMarkersGroup = L.layerGroup().addTo(map);
        const streetPointsGroup = L.layerGroup().addTo(map);
        const infoPointsGroup = L.layerGroup().addTo(map);
        const signsGroup = L.layerGroup().addTo(map); 
        const tasksGroup = L.layerGroup().addTo(map);
        const pollsGroup = L.layerGroup().addTo(map); // НОВЫЙ СЛОЙ ОПРОСОВ
        const routeLinesGroup = L.layerGroup().addTo(map);
        const instructorsGroup = L.layerGroup().addTo(map);

        L.control.layers(
            { "🗺️ Улицы": streetLayer, "🛰️ Спутник": satelliteLayer }, 
            { "🎬 Видео": videoMarkersGroup, "📍 Разборы улиц": streetPointsGroup, "🚦 Знаки": signsGroup, "🎯 Задания": tasksGroup, "❓ Опросы": pollsGroup, "❗️ Информация": infoPointsGroup, "🛣️ Маршруты": routeLinesGroup, "👨‍🏫 Инструкторы": instructorsGroup }, 
            { collapsed: true, position: 'topright' } 
        ).addTo(map);

        // --- ИНСТРУМЕНТ "РУЛЕТКА" ---
        let isMeasuring = false;
        let measureStart = null;
        let measureLineGroup = null;
        let dynamicLine = null;
        let measureTooltip = null;

        function toggleMeasure() {
            isMeasuring = !isMeasuring;
            const btn = document.getElementById('measureBtn');
            const mapContainer = document.getElementById('map');
            if (isMeasuring) {
                btn.classList.add('bg-blue-100', 'text-blue-700', 'border-blue-300');
                btn.classList.remove('bg-white/95', 'text-gray-800', 'border-gray-100');
                btn.innerHTML = '🛑 Отменить рулетку';
                mapContainer.style.cursor = 'crosshair';
                closeMenu(); closeSheet();
            } else {
                btn.classList.remove('bg-blue-100', 'text-blue-700', 'border-blue-300');
                btn.classList.add('bg-white/95', 'text-gray-800', 'border-gray-100');
                btn.innerHTML = '📏 Рулетка';
                mapContainer.style.cursor = '';
                clearMeasure();
            }
        }

        function clearMeasure() {
            if (measureLineGroup) map.removeLayer(measureLineGroup);
            if (dynamicLine) map.removeLayer(dynamicLine);
            if (measureTooltip) map.removeLayer(measureTooltip);
            measureStart = null; measureLineGroup = null; dynamicLine = null; measureTooltip = null;
        }

        map.on('click', function(e) {
            if (!isMeasuring) return;
            if (!measureStart) {
                clearMeasure(); measureStart = e.latlng;
                measureLineGroup = L.featureGroup([L.circleMarker(measureStart, { radius: 5, color: '#ef4444', fillColor: '#fff', fillOpacity: 1, weight: 3 })]).addTo(map);
                measureTooltip = L.tooltip({ permanent: true, className: 'custom-tooltip', direction: 'top', offset: [0, -10] }).setLatLng(measureStart).setContent('Старт').addTo(map);
            } else {
                const dist = map.distance(measureStart, e.latlng);
                if (dynamicLine) map.removeLayer(dynamicLine);
                measureLineGroup.addLayer(L.polyline([measureStart, e.latlng], { color: '#ef4444', weight: 4, dashArray: '5, 8' }));
                measureLineGroup.addLayer(L.circleMarker(e.latlng, { radius: 5, color: '#ef4444', fillColor: '#fff', fillOpacity: 1, weight: 3 }));
                measureTooltip.setLatLng(e.latlng).setContent(`🏁 ${Math.round(dist)} м.`);
                measureStart = null; 
            }
        });

        map.on('mousemove', function(e) {
            if (!isMeasuring || !measureStart) return;
            const dist = map.distance(measureStart, e.latlng);
            if (!dynamicLine) {
                dynamicLine = L.polyline([measureStart, e.latlng], { color: '#ef4444', weight: 4, dashArray: '5, 8', opacity: 0.6 }).addTo(map);
            } else { dynamicLine.setLatLngs([measureStart, e.latlng]); }
            measureTooltip.setLatLng(e.latlng).setContent(`${Math.round(dist)} м.`);
        });

        // =========================================================
        // ИКОНКИ
        // =========================================================

        const videoIcon = L.divIcon({ className: 'brand-icon', html: `<div class="w-7 h-7 bg-blue-600 rounded-lg border-2 border-white shadow-md flex items-center justify-center text-white text-xs">▶️</div>`, iconSize: [28, 28], iconAnchor: [14, 14] });
        const streetIcon = L.divIcon({ className: 'brand-icon', html: `<div class="w-6 h-6 bg-emerald-500 rounded-full border-[1.5px] border-white shadow-sm flex items-center justify-center text-white text-[10px]">📍</div>`, iconSize: [24, 24], iconAnchor: [12, 12] });
        const instructorIcon = L.divIcon({ className: 'instructor-icon', html: `<div class="w-8 h-8 bg-orange-500 rounded-full border-2 border-white shadow-md flex items-center justify-center text-sm">👨‍🏫</div>`, iconSize: [32, 32], iconAnchor: [16, 16] });
        const infoIcon = L.divIcon({ className: 'brand-icon', html: `<div class="w-8 h-8 bg-purple-600 rounded-full border-2 border-white shadow-md flex items-center justify-center text-white font-bold text-sm">!</div>`, iconSize: [32, 32], iconAnchor: [16, 16] });
        
        // Иконка Задания (Розовая)
        const taskIcon = L.divIcon({ className: 'brand-icon', html: `<div class="w-8 h-8 bg-pink-600 rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-sm">🎯</div>`, iconSize: [32, 32], iconAnchor: [16, 16] });
        
        // НОВАЯ Иконка Опроса (Бирюзовая)
        const pollIcon = L.divIcon({ className: 'brand-icon', html: `<div class="w-8 h-8 bg-cyan-500 rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-[10px] font-black">❓</div>`, iconSize: [32, 32], iconAnchor: [16, 16] });

        function getSignIcon(type) {
            let htmlContent = ''; let iSize = [28, 28]; let iAnchor = [14, 14];
            const noStopHtml = `<div class="w-7 h-7 bg-blue-700 rounded-full border-[3px] border-red-600 shadow-md relative flex items-center justify-center overflow-hidden z-10"><div class="absolute w-8 h-[3px] bg-red-600 rotate-45"></div><div class="absolute w-8 h-[3px] bg-red-600 -rotate-45"></div></div>`;
            if (type === 'speed40') { htmlContent = `<div class="w-7 h-7 bg-white rounded-full border-[3px] border-red-600 shadow-md flex items-center justify-center font-black text-black text-[11px] leading-none tracking-tighter">40</div>`; }
            else if (type === 'speed20') { htmlContent = `<div class="w-7 h-7 bg-white rounded-full border-[3px] border-red-600 shadow-md flex items-center justify-center font-black text-black text-[11px] leading-none tracking-tighter">20</div>`; }
            else if (type === 'main_road') { htmlContent = `<div class="w-7 h-7 flex items-center justify-center drop-shadow-md"><div class="w-4 h-4 bg-yellow-400 border-[2px] border-white ring-1 ring-gray-400 transform rotate-45"></div></div>`; }
            else if (type === 'no_stop') { htmlContent = noStopHtml; }
            else if (type === 'stop') { htmlContent = `<div class="flex items-center justify-center w-7 h-7 drop-shadow-md"><svg viewBox="0 0 100 100" class="w-full h-full"><polygon points="30,5 70,5 95,30 95,70 70,95 30,95 5,70 5,30" fill="#dc2626" stroke="white" stroke-width="4"/><text x="50" y="54" font-family="sans-serif" font-weight="900" font-size="28" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-1">STOP</text></svg></div>`; }
            else if (type === 'yield') { htmlContent = `<div class="flex items-center justify-center w-7 h-7 drop-shadow-md"><svg viewBox="0 0 100 100" class="w-full h-full"><polygon points="5,10 95,10 50,90" fill="white" stroke="#dc2626" stroke-width="14" stroke-linejoin="round"/></svg></div>`; }
            return L.divIcon({ className: 'sign-icon', html: htmlContent, iconSize: iSize, iconAnchor: iAnchor });
        }

        // --- ГЕНЕРАЦИЯ КАРТОЧЕК И СПИСКА ---
        let menuHTML = '';

        if (videoPointsData.length > 0) {
            menuHTML += `<h3 class="font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-2 mt-2">🎬 Разборы перекрестков</h3><div class="flex flex-col gap-2 mb-4">`;
            videoPointsData.forEach((p, index) => {
                let author = p.authorName ? `<div class="mt-4 p-3 bg-gray-50 border border-gray-200 rounded-xl"><p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Автор разбора:</p><p class="text-sm font-bold text-gray-800">${p.authorName}</p><p class="text-xs text-blue-600 font-bold mt-0.5">${p.authorPrice}</p><a href="tel:${p.authorPhone}" class="mt-2 block w-full bg-emerald-500 text-white text-center py-2.5 rounded-lg text-xs font-bold uppercase shadow-md tracking-widest">📞 Позвонить</a></div>` : "";
                let fullScreenBtn = p.vkCode ? `<button onclick="openFullscreen(${index}, 'videoPoints')" class="w-full bg-gray-900 text-white py-3.5 mt-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg flex justify-center items-center gap-2 active:bg-gray-700">🎦 На весь экран</button>` : "";
                const html = `<div class="flex flex-col"><span class="text-blue-600 text-[10px] font-black uppercase tracking-widest mb-1">Совет инструктора</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-3">${p.title}</h3>${p.vkCode ? `<div class="video-container shadow-md">${p.vkCode}</div>` : ''}${fullScreenBtn}<p class="text-sm text-gray-700 font-medium leading-snug mt-4">${p.description}</p>${author}${p.telegramLink ? `<a href="${p.telegramLink}" target="_blank" class="w-full bg-[#2AABEE] text-white py-3 rounded-xl text-xs font-black shadow-lg text-center uppercase tracking-widest mt-3 block">Обсудить в группе</a>` : ''}</div>`;
                const cacheId = 'video_' + index; sheetCache[cacheId] = html;
                L.marker([p.lat, p.lng], {icon: videoIcon}).addTo(videoMarkersGroup).bindTooltip(p.title, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([p.lat, p.lng], 17); openSheet(html); });
                menuHTML += `<button onclick="flyToPoint(${p.lat}, ${p.lng}, '${cacheId}')" class="w-full text-left bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-blue-300 hover:shadow-md transition group"><div class="font-bold text-gray-800 text-sm group-hover:text-blue-600">${p.title}</div><div class="text-[10px] text-gray-400 mt-1 truncate">${p.description}</div></button>`;
            });
            menuHTML += `</div>`;
        }

        if (streetPointsData.length > 0) {
            menuHTML += `<h3 class="font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-2 mt-2">📍 Разборы улиц</h3><div class="flex flex-col gap-2 mb-4">`;
            streetPointsData.forEach((p, index) => {
                let fullScreenBtn = p.vkCode ? `<button onclick="openFullscreen(${index}, 'streetPoints')" class="w-full bg-gray-900 text-white py-3.5 mt-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg flex justify-center items-center gap-2 active:bg-gray-700">🎦 На весь экран</button>` : "";
                const html = `<div class="flex flex-col"><span class="text-emerald-600 text-[10px] font-black uppercase tracking-widest mb-1">Проезд участка</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-3">${p.title}</h3>${p.vkCode ? `<div class="video-container shadow-md">${p.vkCode}</div>` : ''}${fullScreenBtn}<p class="text-sm text-gray-700 font-medium leading-snug mt-4">${p.description}</p></div>`;
                const cacheId = 'street_' + index; sheetCache[cacheId] = html;
                L.marker([p.lat, p.lng], {icon: streetIcon}).addTo(streetPointsGroup).bindTooltip(p.title, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([p.lat, p.lng], 17); openSheet(html); });
                menuHTML += `<button onclick="flyToPoint(${p.lat}, ${p.lng}, '${cacheId}')" class="w-full text-left bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-emerald-300 hover:shadow-md transition group"><div class="font-bold text-gray-800 text-sm group-hover:text-emerald-600">${p.title}</div><div class="text-[10px] text-gray-400 mt-1 truncate">${p.description}</div></button>`;
            });
            menuHTML += `</div>`;
        }

        // ЗАДАНИЯ (Теперь без кнопок Telegram)
        if (tasksData && tasksData.length > 0) {
            menuHTML += `<h3 class="font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-2 mt-2">🎯 Практические задания</h3><div class="flex flex-col gap-2 mb-4">`;
            tasksData.forEach((p, index) => {
                const html = `<div class="flex flex-col"><span class="text-pink-600 text-[10px] font-black uppercase tracking-widest mb-1">Экзаменационное задание</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-3">${p.title}</h3><p class="text-sm text-gray-700 font-medium leading-snug mt-2">${p.description}</p></div>`;
                const cacheId = 'task_' + index; sheetCache[cacheId] = html;
                L.marker([p.lat, p.lng], {icon: taskIcon}).addTo(tasksGroup).bindTooltip(p.title, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([p.lat, p.lng], 17); openSheet(html); });
                menuHTML += `<button onclick="flyToPoint(${p.lat}, ${p.lng}, '${cacheId}')" class="w-full text-left bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-pink-300 hover:shadow-md transition group"><div class="font-bold text-gray-800 text-sm group-hover:text-pink-600">${p.title}</div><div class="text-[10px] text-gray-400 mt-1 truncate">${p.description}</div></button>`;
            });
            menuHTML += `</div>`;
        }

        // ОПРОСЫ (Новый крутой слой)
        if (pollsData && pollsData.length > 0) {
            menuHTML += `<h3 class="font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-2 mt-2">❓ Интерактивные опросы</h3><div class="flex flex-col gap-2 mb-4">`;
            pollsData.forEach((p, index) => {
                let tgBtn = p.telegramLink ? `<a href="${p.telegramLink}" target="_blank" class="w-full bg-[#2AABEE] text-white py-3 rounded-xl text-xs font-black shadow-lg text-center uppercase tracking-widest mt-4 block transition hover:bg-[#229ED9]">Перейти к голосованию</a>` : '';
                const html = `<div class="flex flex-col"><span class="text-cyan-600 text-[10px] font-black uppercase tracking-widest mb-1">Проверь себя</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-3">${p.title}</h3><p class="text-sm text-gray-700 font-medium leading-snug mt-2">${p.description}</p>${tgBtn}</div>`;
                const cacheId = 'poll_' + index; sheetCache[cacheId] = html;
                L.marker([p.lat, p.lng], {icon: pollIcon}).addTo(pollsGroup).bindTooltip(p.title, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([p.lat, p.lng], 17); openSheet(html); });
                menuHTML += `<button onclick="flyToPoint(${p.lat}, ${p.lng}, '${cacheId}')" class="w-full text-left bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-cyan-300 hover:shadow-md transition group"><div class="font-bold text-gray-800 text-sm group-hover:text-cyan-600">${p.title}</div><div class="text-[10px] text-gray-400 mt-1 truncate">${p.description}</div></button>`;
            });
            menuHTML += `</div>`;
        }

        if (signsData.length > 0) {
            menuHTML += `<h3 class="font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-2 mt-2">🚦 Дорожные знаки</h3><div class="flex flex-col gap-2 mb-4">`;
            signsData.forEach((p, index) => {
                const html = `<div class="flex flex-col"><span class="text-red-600 text-[10px] font-black uppercase tracking-widest mb-1">Внимание на знак</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-2">${p.title}</h3><p class="text-sm text-gray-700 font-medium leading-snug mt-2">${p.description}</p></div>`;
                const cacheId = 'sign_' + index; sheetCache[cacheId] = html;
                L.marker([p.lat, p.lng], {icon: getSignIcon(p.type)}).addTo(signsGroup).bindTooltip(p.title, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([p.lat, p.lng], 17); openSheet(html); });
                menuHTML += `<button onclick="flyToPoint(${p.lat}, ${p.lng}, '${cacheId}')" class="w-full text-left bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-red-300 hover:shadow-md transition group"><div class="font-bold text-gray-800 text-sm group-hover:text-red-600">${p.title}</div><div class="text-[10px] text-gray-400 mt-1 truncate">${p.description}</div></button>`;
            });
            menuHTML += `</div>`;
        }

        if (infoPointsData.length > 0) {
            infoPointsData.forEach((p, index) => {
                let mediaHtml = p.imageUrl ? `<img src="${p.imageUrl}" alt="Инфо" class="w-full h-auto mt-2 rounded-lg shadow-sm border border-gray-100 object-cover">` : '';
                let linksHtml = p.fileUrl ? `<a href="${p.fileUrl}" target="_blank" class="w-full bg-indigo-50 text-indigo-700 text-center py-2.5 rounded-lg text-xs font-bold uppercase shadow-sm mt-2 block border border-indigo-200 hover:bg-indigo-100 transition">📄 Открыть документ</a>` : '';
                if (p.phone) linksHtml += `<a href="tel:${p.phone}" class="w-full bg-emerald-50 text-emerald-700 text-center py-2.5 rounded-lg text-xs font-bold uppercase shadow-sm mt-2 block border border-emerald-200 hover:bg-emerald-100 transition">📞 Позвонить</a>`;
                const html = `<div class="flex flex-col"><span class="text-purple-600 text-[10px] font-black uppercase tracking-widest mb-1">Справка</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-2">${p.title}</h3>${mediaHtml}<p class="text-sm text-gray-700 font-medium leading-snug mt-3">${p.description}</p>${linksHtml}</div>`;
                const cacheId = 'info_' + index; sheetCache[cacheId] = html;
                L.marker([p.lat, p.lng], {icon: infoIcon}).addTo(infoPointsGroup).bindTooltip(p.title, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([p.lat, p.lng], 17); openSheet(html); });
            });
        }

        if (routeLinesData.length > 0) {
            routeLinesData.forEach((r, index) => {
                const line = L.polyline(r.coordinates, { color: r.color || '#10B981', weight: 8 }).addTo(routeLinesGroup);
                let fullScreenBtn = r.vkCode ? `<button onclick="openFullscreen(${index}, 'routeLines')" class="w-full bg-gray-900 text-white py-3.5 mt-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg flex justify-center items-center gap-2 active:bg-gray-700">🎦 На весь экран</button>` : "";
                const html = `<div class="flex flex-col"><span class="text-emerald-600 text-[10px] font-black uppercase tracking-widest mb-1">Проезд участка</span><h3 class="font-black text-gray-900 text-xl leading-tight mb-3">${r.title}</h3>${r.vkCode ? `<div class="video-container shadow-md">${r.vkCode}</div>` : ''}${fullScreenBtn}<p class="text-sm text-gray-700 font-medium leading-snug mt-4">${r.description}</p></div>`;
                const cacheId = 'route_' + index; sheetCache[cacheId] = html;
                line.bindTooltip(r.title, { sticky: true, className: 'custom-tooltip' });
                line.on('click', (e) => { map.flyTo(e.latlng, 17); openSheet(html); });
            });
        }

        instructorsData.forEach((i, index) => {
            const html = `<div class="flex flex-col"><div class="flex gap-4 items-center mb-4"><img src="${i.photoUrl}" class="w-16 h-16 rounded-full border-2 border-orange-500 shadow-md object-cover"><div><h3 class="font-black text-gray-900 text-xl leading-tight">${i.name}</h3><p class="text-gray-500 text-xs font-medium mt-0.5">${i.car}</p><div class="text-yellow-400 text-xs mt-1 font-black uppercase">⭐⭐⭐⭐⭐ ${i.rating}</div></div></div><p class="text-sm text-gray-700 italic bg-gray-50 p-3 rounded-lg border border-gray-100 mb-4">"${i.description}"</p><div class="flex gap-2"><a href="tel:${i.phone}" class="flex-1 bg-emerald-500 text-white text-center py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-md">📞 Звонок</a><a href="${i.telegramLink}" target="_blank" class="flex-1 bg-[#2AABEE] text-white text-center py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-md">💬 Написать</a></div></div>`;
            L.marker([i.lat, i.lng], {icon: instructorIcon}).addTo(instructorsGroup).bindTooltip(i.name, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' }).on('click', () => { map.flyTo([i.lat, i.lng], 17); openSheet(html); });
        });

        document.getElementById('menuContent').innerHTML = menuHTML;

    </script>
</body>
</html>
